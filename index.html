<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistem Informasi Apel Pegawai - SBB</title>
    
    <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        :root { --primary: #2c3e50; --success: #27ae60; --danger: #e74c3c; --bg: #f4f7f9; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; }

        #report-area { 
            width: 100%; 
            max-width: 480px; 
            background: white; 
            display: flex; 
            flex-direction: column; 
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header-kop { display: flex; align-items: center; padding: 12px 18px; background: white; border-bottom: 3px solid #000; gap: 15px; }
        .logo-kab { width: 40px; height: 50px; object-fit: contain; }
        .opd-info b { font-size: 14px; color: #111; display: block; text-transform: uppercase; line-height: 1.2; }
        .opd-info span { font-size: 10px; color: #444; font-weight: bold; }

        #photo-container { position: relative; width: 100%; background: #000; line-height: 0; overflow: hidden; height: 280px; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .mirror { transform: scaleX(-1); }
        
        canvas#overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; }
        #snapshot-canvas { display: none; width: 100%; }

        .cam-controls {
            position: absolute; bottom: 10px; left: 10px; right: 10px; z-index: 10;
            display: flex; flex-direction: column; gap: 5px; background: rgba(0,0,0,0.4);
            padding: 8px; border-radius: 8px;
        }

        .cam-row { display: flex; align-items: center; gap: 10px; color: white; font-size: 11px; }
        .cam-row input { flex: 1; accent-color: var(--success); }

        #switch-btn {
            position: absolute; top: 10px; right: 10px; z-index: 10;
            background: var(--success); color: white; border: none;
            padding: 6px 10px; border-radius: 5px; cursor: pointer; font-size: 10px; font-weight: bold;
        }

        .data-footer { padding: 12px 15px; background: white; display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 10px; border-top: 1px solid #eee; }
        .footer-section h4 { margin: 0 0 5px 0; font-size: 11px; color: var(--success); border-bottom: 1px solid #eee; padding-bottom: 2px; }
        .info-text { font-size: 9px; color: #333; line-height: 1.3; }
        #map { width: 100%; height: 90px; margin-top: 5px; border: 1px solid #ddd; border-radius: 4px; }
        .rekap-grid { display: grid; grid-template-columns: 1fr auto; gap: 2px; font-size: 10px; }

        .status-badge { display: inline-block; padding: 2px 6px; border-radius: 4px; color: white; font-weight: bold; font-size: 9px; margin-top: 3px; }
        .status-in { background: var(--success); }
        .status-out { background: var(--danger); }

        .controls { width: 92%; max-width: 480px; margin: 15px 0; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); box-sizing: border-box; }
        .grid-input { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
        input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 13px; }
        .btn-main { background: var(--success); color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 15px; }
        .btn-main:disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body onload="startApp()">

    <div id="report-area">
        <div class="header-kop">
            <img src="img/Kab-sbb.png" class="logo-kab" onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/b/b2/Logo_Kabupaten_Seram_Bagian_Barat.png'">
            <div class="opd-info">
                <span>PEMERINTAH KABUPATEN SERAM BAGIAN BARAT</span>
                <b id="opd-name-top">BKPSDM</b>
            </div>
        </div>

        <div id="photo-container">
            <button id="switch-btn" onclick="toggleCamera()">🔄 GANTI</button>
            <div class="cam-controls">
                <div id="zoom-area" class="cam-row">🔍 <input type="range" id="zoom-range" min="1" max="3" step="0.1" value="1" oninput="applyZoom()"></div>
            </div>
            <video id="video" autoplay muted playsinline></video>
            <canvas id="overlay"></canvas>
            <canvas id="snapshot-canvas"></canvas>
        </div>

        <div class="data-footer">
            <div class="footer-section">
                <h4>LOKASI & WAKTU</h4>
                <div class="info-text">
                    📅 <span id="wm-date">-</span> | ⏰ <span id="wm-time">-</span><br>
                    📍 <span id="location-text">Mencari GPS...</span><br>
                    📏 Jarak: <b id="distance-info">0m</b> 
                    <span id="zone-status" class="status-badge status-out">DI LUAR AREA</span><br>
                    <small id="gps-accuracy">Akurasi: --</small>
                </div>
                <div id="map"></div>
            </div>
            
            <div class="footer-section">
                <h4>REKAP KEHADIRAN</h4>
                <div class="rekap-grid">
                    <span>Hadir (AI):</span> <b id="out-hadir" style="color:var(--success); font-size:14px;">0</b>
                    <span>Cuti:</span> <b id="out-cuti">0</b>
                    <span>Izin:</span> <b id="out-izin">0</b>
                    <span>Sakit:</span> <b id="out-sakit">0</b>
                    <span>Tugas:</span> <b id="out-tugas">0</b>
                    <span>Belajar:</span> <b id="out-belajar">0</b>
                </div>
            </div>
        </div>
    </div>

    <div class="controls">
        <input type="text" id="input-opd" placeholder="Nama OPD..." oninput="syncText(this, 'opd-name-top')" style="margin-bottom:10px;">
        <div class="grid-input">
            <input type="number" placeholder="Cuti" oninput="syncText(this, 'out-cuti')">
            <input type="number" placeholder="Izin" oninput="syncText(this, 'out-izin')">
            <input type="number" placeholder="Sakit" oninput="syncText(this, 'out-sakit')">
            <input type="number" placeholder="Tugas" oninput="syncText(this, 'out-tugas')">
            <input type="number" placeholder="Izin Belajar" oninput="syncText(this, 'out-belajar')" style="grid-column: span 2;">
        </div>
        <button class="btn-main" id="btn-save" onclick="generateFastPDF()" disabled>MENUNGGU SINYAL GPS...</button>
    </div>

    <script>
        const video = document.getElementById('video');
        const btnSave = document.getElementById('btn-save');
        let currentStream = null;
        let useFrontCamera = true;
        let map, marker, circle;

        // KOORDINAT TARGET (BKPSDM SBB)
        const OFFICE_LAT = -3.10000; 
        const OFFICE_LNG = 128.20000;
        const ALLOWED_DISTANCE = 500; 

        async function applyZoom() {
            if (!currentStream) return;
            const track = currentStream.getVideoTracks();
            const zoomVal = document.getElementById('zoom-range').value;
            try {
                await track.applyConstraints({ advanced: [{ zoom: parseFloat(zoomVal) }] });
            } catch (e) {
                video.style.transform = (useFrontCamera ? "scaleX(-1) " : "") + `scale(${zoomVal})`;
            }
        }

        async function startApp() {
            try {
                const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';
                await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
                initCamera();
                initGPS();
                setInterval(() => {
                    const n = new Date();
                    document.getElementById('wm-time').innerText = n.toLocaleTimeString('id-ID');
                    document.getElementById('wm-date').innerText = n.toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' });
                }, 1000);
            } catch (err) { alert("Gagal memuat AI!"); }
        }

        async function initCamera() {
            if (currentStream) currentStream.getTracks().forEach(t => t.stop());
            try {
                currentStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: useFrontCamera ? "user" : "environment", width: 1280, height: 720 }
                });
                video.srcObject = currentStream;
                video.classList.toggle('mirror', useFrontCamera);
                video.onloadedmetadata = detectFaces;
            } catch (err) { alert("Kamera Error!"); }
        }

        function toggleCamera() { useFrontCamera = !useFrontCamera; initCamera(); }

        async function detectFaces() {
            const canvas = document.getElementById('overlay');
            const displaySize = { width: video.clientWidth, height: video.clientHeight };
            faceapi.matchDimensions(canvas, displaySize);

            setInterval(async () => {
                const options = new faceapi.TinyFaceDetectorOptions({ inputSize: 512, scoreThreshold: 0.3 });
                const detections = await faceapi.detectAllFaces(video, options);
                document.getElementById('out-hadir').innerText = detections.length;
                
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                faceapi.draw.drawDetections(canvas, faceapi.resizeResults(detections, displaySize));
            }, 600);
        }

        // --- FUNGSI AUTO BRIGHTNESS (PROSES INTERNAL SAAT CAPTURE) ---
        function autoAdjustBrightness(ctx, width, height) {
            const imageData = ctx.getImageData(0, 0, width, height);
            const data = imageData.data;
            let colorSum = 0;

            for (let i = 0; i < data.length; i += 4) {
                colorSum += (data[i] + data[i+1] + data[i+2]) / 3;
            }

            const brightness = colorSum / (width * height);
            const factor = 128 / (brightness || 1); 
            
            ctx.filter = `brightness(${factor * 100}%) contrast(105%)`;
            ctx.drawImage(video, 0, 0, width, height);
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const φ1 = lat1 * Math.PI/180;
            const φ2 = lat2 * Math.PI/180;
            const Δφ = (lat2-lat1) * Math.PI/180;
            const Δλ = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(Δφ/2)**2 + Math.cos(φ1) * Math.cos(φ2) * Math.sin(Δλ/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function initGPS() {
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(pos => {
                    const { latitude, longitude, accuracy } = pos.coords;
                    const distance = calculateDistance(latitude, longitude, OFFICE_LAT, OFFICE_LNG);
                    
                    document.getElementById('location-text').innerText = `${latitude.toFixed(5)}, ${longitude.toFixed(5)}`;
                    document.getElementById('gps-accuracy').innerText = `Akurasi: ${Math.round(accuracy)}m`;
                    document.getElementById('distance-info').innerText = `${Math.round(distance)}m`;

                    const zoneStatus = document.getElementById('zone-status');
                    if (distance <= ALLOWED_DISTANCE) {
                        zoneStatus.innerText = "DALAM AREA";
                        zoneStatus.className = "status-badge status-in";
                        btnSave.disabled = false;
                        btnSave.innerText = "💾 SIMPAN PDF";
                    } else {
                        zoneStatus.innerText = "DI LUAR AREA";
                        zoneStatus.className = "status-badge status-out";
                        btnSave.disabled = true;
                        btnSave.innerText = "JARAK TERLALU JAUH";
                    }

                    if (!map) {
                        map = L.map('map', { zoomControl: false, attributionControl: false }).setView([latitude, longitude], 15);
                        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                        marker = L.marker([latitude, longitude]).addTo(map);
                        // Visualisasi radius 500m
                        circle = L.circle([OFFICE_LAT, OFFICE_LNG], {
                            radius: ALLOWED_DISTANCE, 
                            color: '#27ae60', 
                            fillColor: '#27ae60', 
                            fillOpacity: 0.15
                        }).addTo(map);
                    } else {
                        map.setView([latitude, longitude]);
                        marker.setLatLng([latitude, longitude]);
                    }
                }, err => {
                    document.getElementById('location-text').innerText = "GPS Error/Izin Ditolak";
                }, { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 });
            }
        }

        function syncText(el, id) { 
            document.getElementById(id).innerText = el.value || (id.includes('opd') ? 'BKPSDM' : '0'); 
        }

        async function generateFastPDF() {
            btnSave.innerText = "⏳ PROSES...";
            btnSave.disabled = true;

            const area = document.getElementById('report-area');
            const snapCanvas = document.getElementById('snapshot-canvas');
            const ctxSnap = snapCanvas.getContext('2d');

            snapCanvas.width = video.videoWidth;
            snapCanvas.height = video.videoHeight;

            if (useFrontCamera) {
                ctxSnap.translate(snapCanvas.width, 0);
                ctxSnap.scale(-1, 1);
            }

            // Jalankan Auto-Brightness otomatis secara internal sebelum render PDF
            autoAdjustBrightness(ctxSnap, snapCanvas.width, snapCanvas.height);
            
            video.style.display = 'none';
            snapCanvas.style.display = 'block';

            try {
                const canvas = await html2canvas(area, { useCORS: true, scale: 2 });
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF('p', 'mm', 'a4');
                const imgData = canvas.toDataURL('image/jpeg', 0.9);
                pdf.addImage(imgData, 'JPEG', 0, 0, 210, (canvas.height * 210) / canvas.width);
                pdf.save(`ABSEN_SBB_${Date.now()}.pdf`);
            } catch (err) {
                alert("Gagal simpan PDF!");
            } finally {
                video.style.display = 'block';
                snapCanvas.style.display = 'none';
                btnSave.innerText = "💾 SIMPAN PDF";
                btnSave.disabled = false;
            }
        }
    </script>
</body>
</html>
