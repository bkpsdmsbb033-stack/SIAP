<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistem Laporan Kehadiran Pro - SBB</title>
    
    <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        :root { --primary: #2c3e50; --success: #27ae60; --bg: #f4f7f9; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; }
        #report-area { width: 100%; max-width: 480px; background: white; display: flex; flex-direction: column; position: relative; }
        .header-kop { display: flex; align-items: center; padding: 18px; background: white; border-bottom: 3px solid #000; gap: 15px; }
        .logo-kab { width: 45px; height: 55px; object-fit: contain; }
        .opd-info b { font-size: 15px; color: #111; display: block; text-transform: uppercase; line-height: 1.2; }
        .opd-info span { font-size: 11px; color: #444; font-weight: bold; }
        #photo-container { position: relative; width: 100%; background: #000; line-height: 0; overflow: hidden; min-height: 300px; }
        video { width: 100%; display: block; transition: filter 0.2s; }
        .mirror { transform: scaleX(-1); }
        canvas#overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; }
        #snapshot-canvas { display: none; width: 100%; }
        .cam-controls { position: absolute; bottom: 15px; left: 10px; right: 10px; z-index: 10; display: flex; flex-direction: column; gap: 10px; background: rgba(0,0,0,0.4); padding: 10px; border-radius: 8px; }
        .cam-row { display: flex; align-items: center; gap: 10px; color: white; font-size: 12px; }
        .cam-row input { flex: 1; accent-color: var(--success); }
        #switch-btn { position: absolute; top: 10px; right: 10px; z-index: 10; background: var(--success); color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-size: 11px; font-weight: bold; }
        .data-footer { padding: 18px; background: white; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; border-top: 1px solid #eee; }
        .footer-section h4 { margin: 0 0 8px 0; font-size: 13px; color: var(--success); border-bottom: 1px solid #eee; padding-bottom: 4px; }
        .info-text { font-size: 10px; color: #333; line-height: 1.4; }
        #map { width: 100%; height: 100px; margin-top: 8px; border: 1px solid #ddd; border-radius: 4px; }
        .rekap-grid { display: grid; grid-template-columns: 1fr auto; gap: 4px; font-size: 11px; }
        .controls { width: 92%; max-width: 480px; margin: 20px 0; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); box-sizing: border-box; }
        .grid-input { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
        input[type="text"], input[type="number"] { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-main { background: var(--success); color: white; border: none; padding: 18px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn-main:disabled { background: #ccc; }
    </style>
</head>
<body onload="startApp()">

    <div id="report-area">
        <div class="header-kop">
            <img src="img/Kab-sbb.png" class="logo-kab" onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/b/bc/Lambang_Kabupaten_Seram_Bagian_Barat.png'">
            <div class="opd-info">
                <b id="opd-name-top">BKPSDM</b>
                <span>PEMERINTAH KABUPATEN SERAM BAGIAN BARAT</span>
            </div>
        </div>

        <div id="photo-container">
            <button id="switch-btn" onclick="toggleCamera()">🔄 GANTI KAMERA</button>
            <div class="cam-controls">
                <div class="cam-row">☀️ <input type="range" id="bright-range" min="50" max="150" value="100" oninput="applyFilters()"></div>
                <div id="zoom-area" class="cam-row" style="display: none;">🔍 <input type="range" id="zoom-range" min="1" max="3" step="0.1" value="1" oninput="applyZoom()"></div>
            </div>
            <video id="video" autoplay muted playsinline></video>
            <canvas id="overlay"></canvas>
            <canvas id="snapshot-canvas"></canvas>
        </div>

        <div class="data-footer">
            <div class="footer-section">
                <h4>INFORMASI LOKASI</h4>
                <div class="info-text">
                    📅 <b id="wm-date">-</b><br>
                    ⏰ <b id="wm-time">-</b><br>
                    📍 <b id="location-text">Mencari GPS...</b><br>
                    <span style="color:var(--success); font-weight:bold" id="gps-accuracy">📡 Mengunci Sinyal...</span>
                </div>
                <div id="map"></div>
            </div>
            <div class="footer-section">
                <h4>REKAP KEHADIRAN</h4>
                <div class="rekap-grid">
                    <span>Hadir (AI):</span> <b id="out-hadir">0</b>
                    <span>Cuti:</span> <b id="out-cuti">0</b>
                    <span>Izin:</span> <b id="out-izin">0</b>
                    <span>Sakit:</span> <b id="out-sakit">0</b>
                    <span>Tugas:</span> <b id="out-tugas">0</b>
                    <span>Izin Belajar:</span> <b id="out-belajar">0</b>
                </div>
            </div>
        </div>
    </div>

    <div class="controls">
        <input type="text" id="input-opd" placeholder="Ketik Nama OPD..." oninput="syncText(this, 'opd-name-top')" style="margin-bottom:12px;">
        <div class="grid-input">
            <input type="number" placeholder="Cuti" oninput="syncText(this, 'out-cuti')">
            <input type="number" placeholder="Izin" oninput="syncText(this, 'out-izin')">
            <input type="number" placeholder="Sakit" oninput="syncText(this, 'out-sakit')">
            <input type="number" placeholder="Tugas" oninput="syncText(this, 'out-tugas')">
            <input type="number" placeholder="Izin Belajar" oninput="syncText(this, 'out-belajar')" style="grid-column: span 2;">
        </div>
        <button class="btn-main" id="btn-save" onclick="generateFastPDF()" disabled>⌛ MENGUNCI LOKASI...</button>
    </div>

    <script>
        const video = document.getElementById('video');
        const btnSave = document.getElementById('btn-save');
        let currentStream = null;
        let useFrontCamera = true;
        let map, marker;

        function applyFilters() {
            video.style.filter = `brightness(${document.getElementById('bright-range').value}%)`;
        }

        async function applyZoom() {
            if (!currentStream) return;
            const track = currentStream.getVideoTracks()[0];
            try {
                await track.applyConstraints({ advanced: [{ zoom: document.getElementById('zoom-range').value }] });
            } catch (e) {
                video.style.transform = (useFrontCamera ? "scaleX(-1) " : "") + `scale(${document.getElementById('zoom-range').value})`;
            }
        }

        async function startApp() {
            try {
                const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';
                await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
                initCamera();
                initGPS();
                setInterval(() => {
                    const n = new Date();
                    document.getElementById('wm-time').innerText = n.toLocaleTimeString('id-ID');
                    document.getElementById('wm-date').innerText = n.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
                }, 1000);
            } catch (err) { console.error("Model Load Error"); }
        }

        async function initCamera() {
            if (currentStream) currentStream.getTracks().forEach(t => t.stop());
            try {
                currentStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: useFrontCamera ? "user" : "environment", width: 640, height: 480 }
                });
                video.srcObject = currentStream;
                video.classList.toggle('mirror', useFrontCamera);
                video.onloadedmetadata = detectFaces;
            } catch (err) { alert("Izin kamera diperlukan!"); }
        }

        function toggleCamera() { useFrontCamera = !useFrontCamera; initCamera(); }

        async function detectFaces() {
            const canvas = document.getElementById('overlay');
            const displaySize = { width: video.clientWidth, height: video.clientHeight };
            faceapi.matchDimensions(canvas, displaySize);
            setInterval(async () => {
                const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions());
                document.getElementById('out-hadir').innerText = detections.length;
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                faceapi.draw.drawDetections(canvas, faceapi.resizeResults(detections, displaySize));
            }, 500);
        }

        function initGPS() {
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(pos => {
                    const { latitude, longitude, accuracy } = pos.coords;
                    document.getElementById('location-text').innerText = `${latitude.toFixed(6)}, ${longitude.toFixed(6)}`;
                    document.getElementById('gps-accuracy').innerText = `📡 Sinyal OK (${Math.round(accuracy)}m)`;
                    btnSave.disabled = false;
                    btnSave.innerText = "💾 SIMPAN PDF KE HP";
                    if (!map) {
                        map = L.map('map', { zoomControl: false, attributionControl: false }).setView([latitude, longitude], 17);
                        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { crossOrigin: true }).addTo(map);
                        marker = L.marker([latitude, longitude]).addTo(map);
                    } else {
                        map.setView([latitude, longitude]);
                        marker.setLatLng([latitude, longitude]);
                    }
                }, null, { enableHighAccuracy: true });
            }
        }

        function syncText(el, id) { 
            document.getElementById(id).innerText = el.value.toUpperCase() || (id.includes('opd') ? 'BKPSDM' : '0'); 
        }

        // PERBAIKAN FUNGSI SIMPAN PDF
        async function generateFastPDF() {
            btnSave.innerText = "⚡ MENGUNDUH...";
            btnSave.disabled = true;

            const area = document.getElementById('report-area');
            const snapCanvas = document.getElementById('snapshot-canvas');
            
            // 1. Ambil Foto Realtime
            snapCanvas.width = video.videoWidth;
            snapCanvas.height = video.videoHeight;
            const snapCtx = snapCanvas.getContext('2d');
            if (useFrontCamera) {
                snapCtx.translate(snapCanvas.width, 0);
                snapCtx.scale(-1, 1);
            }
            snapCtx.filter = video.style.filter;
            snapCtx.drawImage(video, 0, 0);
            
            // Sembunyikan video asli agar html2canvas mengambil snapshot saja
            video.style.visibility = 'hidden';
            snapCanvas.style.display = 'block';
            snapCanvas.style.position = 'absolute';
            snapCanvas.style.top = '0';

            try {
                // 2. Render Area ke Canvas
                const canvas = await html2canvas(area, {
                    useCORS: true,
                    scale: 1.5, // Dikecilkan sedikit agar HP tidak crash
                    backgroundColor: "#ffffff",
                    logging: false
                });

                // 3. Konversi ke PDF
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF('p', 'mm', 'a4');
                const imgData = canvas.toDataURL('image/jpeg', 0.75); // Kompresi 75%
                
                const pdfWidth = 210;
                const pdfHeight = (canvas.height * pdfWidth) / canvas.width;
                
                pdf.addImage(imgData, 'JPEG', 0, 0, pdfWidth, pdfHeight);

                // 4. TRICK ANDROID: Gunakan Blob untuk download jika save() gagal
                const fileName = `LAPORAN_${document.getElementById('opd-name-top').innerText}.pdf`;
                const blobPDF = pdf.output('blob');
                const blobUrl = URL.createObjectURL(blobPDF);
                
                const link = document.createElement('a');
                link.href = blobUrl;
                link.download = fileName;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                
                setTimeout(() => URL.revokeObjectURL(blobUrl), 100);

            } catch (err) {
                alert("Gagal: Gunakan Browser Chrome!");
                console.error(err);
            } finally {
                video.style.visibility = 'visible';
                snapCanvas.style.display = 'none';
                btnSave.innerText = "💾 SIMPAN PDF KE HP";
                btnSave.disabled = false;
            }
        }
    </script>
</body>
</html>
