<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistem Laporan Kehadiran Pro - SBB</title>
    
    <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        :root { --primary: #2c3e50; --success: #27ae60; --bg: #f4f7f9; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; }

        /* AREA LAPORAN (UKURAN DIOPTIMALKAN UNTUK LAYAR HP) */
        #report-area { 
            width: 100%; 
            max-width: 480px; 
            background: white; 
            display: flex; 
            flex-direction: column; 
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header-kop { display: flex; align-items: center; padding: 12px 18px; background: white; border-bottom: 3px solid #000; gap: 15px; }
        .logo-kab { width: 40px; height: 50px; object-fit: contain; }
        .opd-info b { font-size: 14px; color: #111; display: block; text-transform: uppercase; line-height: 1.2; }
        .opd-info span { font-size: 10px; color: #444; font-weight: bold; }

        /* Tinggi Video Dikurangi agar Footer Naik */
        #photo-container { position: relative; width: 100%; background: #000; line-height: 0; overflow: hidden; height: 260px; }
        video { width: 100%; height: 100%; object-fit: cover; transition: filter 0.2s; }
        .mirror { transform: scaleX(-1); }
        
        canvas#overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; }
        #snapshot-canvas { display: none; width: 100%; }

        .cam-controls {
            position: absolute; bottom: 10px; left: 10px; right: 10px; z-index: 10;
            display: flex; flex-direction: column; gap: 5px; background: rgba(0,0,0,0.4);
            padding: 8px; border-radius: 8px;
        }

        .cam-row { display: flex; align-items: center; gap: 10px; color: white; font-size: 11px; }
        .cam-row input { flex: 1; accent-color: var(--success); }

        #switch-btn {
            position: absolute; top: 10px; right: 10px; z-index: 10;
            background: var(--success); color: white; border: none;
            padding: 6px 10px; border-radius: 5px; cursor: pointer;
            font-size: 10px; font-weight: bold;
        }

        /* Padding Footer Diperkecil agar masuk frame */
        .data-footer { padding: 12px 15px; background: white; display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 10px; border-top: 1px solid #eee; }
        .footer-section h4 { margin: 0 0 5px 0; font-size: 12px; color: var(--success); border-bottom: 1px solid #eee; padding-bottom: 2px; }
        .info-text { font-size: 9.5px; color: #333; line-height: 1.3; }
        #map { width: 100%; height: 80px; margin-top: 5px; border: 1px solid #ddd; border-radius: 4px; }
        .rekap-grid { display: grid; grid-template-columns: 1fr auto; gap: 2px; font-size: 10px; }

        /* PANEL KONTROL */
        .controls { width: 92%; max-width: 480px; margin: 15px 0; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); box-sizing: border-box; }
        .grid-input { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
        input[type="text"], input[type="number"] { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 13px; }
        .btn-main { background: var(--success); color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 15px; }
        .btn-main:disabled { background: #ccc; }
    </style>
</head>
<body onload="startApp()">

    <div id="report-area">
        <div class="header-kop">
            <img src="img/Kab-sbb.png" class="logo-kab">
            <div class="opd-info">
                <b id="opd-name-top">BKPSDM</b>
                <span>PEMERINTAH KABUPATEN SERAM BAGIAN BARAT</span>
            </div>
        </div>

        <div id="photo-container">
            <button id="switch-btn" onclick="toggleCamera()">🔄 GANTI</button>
            <div class="cam-controls">
                <div class="cam-row">☀️ <input type="range" id="bright-range" min="50" max="150" value="100" oninput="applyFilters()"></div>
                <div id="zoom-area" class="cam-row" style="display: none;">🔍 <input type="range" id="zoom-range" min="1" max="3" step="0.1" value="1" oninput="applyZoom()"></div>
            </div>
            <video id="video" autoplay muted playsinline></video>
            <canvas id="overlay"></canvas>
            <canvas id="snapshot-canvas"></canvas>
        </div>

        <div class="data-footer">
            <div class="footer-section">
                <h4>LOKASI & WAKTU</h4>
                <div class="info-text">
                    📅 <span id="wm-date">-</span><br>
                    ⏰ <span id="wm-time">-</span><br>
                    📍 <span id="location-text">GPS...</span><br>
                    <small id="gps-accuracy" style="color:var(--success)">Sinyal...</small>
                </div>
                <div id="map"></div>
            </div>
            
            <div class="footer-section">
                <h4>REKAP DATA</h4>
                <div class="rekap-grid">
                    <span>Hadir:</span> <b id="out-hadir">0</b>
                    <span>Cuti:</span> <b id="out-cuti">0</b>
                    <span>Izin:</span> <b id="out-izin">0</b>
                    <span>Sakit:</span> <b id="out-sakit">0</b>
                    <span>Tugas:</span> <b id="out-tugas">0</b>
                    <span>Belajar:</span> <b id="out-belajar">0</b>
                </div>
            </div>
        </div>
    </div>

    <div class="controls">
        <input type="text" id="input-opd" placeholder="Nama OPD..." oninput="syncText(this, 'opd-name-top')" style="margin-bottom:10px;">
        <div class="grid-input">
            <input type="number" placeholder="Cuti" oninput="syncText(this, 'out-cuti')">
            <input type="number" placeholder="Izin" oninput="syncText(this, 'out-izin')">
            <input type="number" placeholder="Sakit" oninput="syncText(this, 'out-sakit')">
            <input type="number" placeholder="Tugas" oninput="syncText(this, 'out-tugas')">
            <input type="number" placeholder="Izin Belajar" oninput="syncText(this, 'out-belajar')" style="grid-column: span 2;">
        </div>
        <button class="btn-main" id="btn-save" onclick="generateFastPDF()" disabled>⌛ MENGUNCI GPS...</button>
    </div>

    <script>
        const video = document.getElementById('video');
        const btnSave = document.getElementById('btn-save');
        let currentStream = null;
        let useFrontCamera = true;
        let map, marker;

        function applyFilters() {
            video.style.filter = `brightness(${document.getElementById('bright-range').value}%)`;
        }

        async function applyZoom() {
            if (!currentStream) return;
            const track = currentStream.getVideoTracks()[0];
            try {
                await track.applyConstraints({ advanced: [{ zoom: document.getElementById('zoom-range').value }] });
            } catch (e) {
                video.style.transform = (useFrontCamera ? "scaleX(-1) " : "") + `scale(${document.getElementById('zoom-range').value})`;
            }
        }

        async function startApp() {
            try {
                const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';
                await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
                initCamera();
                initGPS();
                setInterval(() => {
                    const n = new Date();
                    document.getElementById('wm-time').innerText = n.toLocaleTimeString('id-ID');
                    document.getElementById('wm-date').innerText = n.toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' });
                }, 1000);
            } catch (err) { console.error("FaceAPI Fail"); }
        }

        async function initCamera() {
            if (currentStream) currentStream.getTracks().forEach(t => t.stop());
            try {
                currentStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: useFrontCamera ? "user" : "environment", width: 640, height: 480 }
                });
                video.srcObject = currentStream;
                video.classList.toggle('mirror', useFrontCamera);
                
                const track = currentStream.getVideoTracks()[0];
                const caps = track.getCapabilities ? track.getCapabilities() : {};
                document.getElementById('zoom-area').style.display = caps.zoom ? 'flex' : 'none';
                
                video.onloadedmetadata = detectFaces;
            } catch (err) { alert("Kamera Error!"); }
        }

        function toggleCamera() { useFrontCamera = !useFrontCamera; initCamera(); }

        async function detectFaces() {
            const canvas = document.getElementById('overlay');
            const displaySize = { width: video.clientWidth, height: video.clientHeight };
            faceapi.matchDimensions(canvas, displaySize);
            setInterval(async () => {
                const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions());
                document.getElementById('out-hadir').innerText = detections.length;
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                faceapi.draw.drawDetections(canvas, faceapi.resizeResults(detections, displaySize));
            }, 600);
        }

        function initGPS() {
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(pos => {
                    const { latitude, longitude, accuracy } = pos.coords;
                    document.getElementById('location-text').innerText = `${latitude.toFixed(5)},${longitude.toFixed(5)}`;
                    document.getElementById('gps-accuracy').innerText = `Akurasi: ${Math.round(accuracy)}m`;
                    btnSave.disabled = false;
                    btnSave.innerText = "💾 SIMPAN PDF";
                    
                    if (!map) {
                        map = L.map('map', { zoomControl: false, attributionControl: false }).setView([latitude, longitude], 17);
                        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { crossOrigin: true }).addTo(map);
                        marker = L.marker([latitude, longitude]).addTo(map);
                    } else {
                        map.setView([latitude, longitude]);
                        marker.setLatLng([latitude, longitude]);
                    }
                }, null, { enableHighAccuracy: true });
            }
        }

        function syncText(el, id) { 
            document.getElementById(id).innerText = el.value || (id.includes('opd') ? 'BKPSDM' : '0'); 
        }

        async function generateFastPDF() {
            btnSave.innerText = "⏳ PROSES...";
            btnSave.disabled = true;

            const area = document.getElementById('report-area');
            const snapCanvas = document.getElementById('snapshot-canvas');

            // Ambil Frame Video
            snapCanvas.width = video.videoWidth;
            snapCanvas.height = video.videoHeight;
            const ctxSnap = snapCanvas.getContext('2d');
            if (useFrontCamera) {
                ctxSnap.translate(snapCanvas.width, 0);
                ctxSnap.scale(-1, 1);
            }
            ctxSnap.filter = getComputedStyle(video).filter;
            ctxSnap.drawImage(video, 0, 0);
            
            video.style.display = 'none';
            snapCanvas.style.display = 'block';

            try {
                const canvas = await html2canvas(area, {
                    useCORS: true,
                    scale: 2,
                    backgroundColor: "#ffffff",
                    scrollY: -window.scrollY // Fix posisi potret
                });

                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF('p', 'mm', 'a4');
                const imgData = canvas.toDataURL('image/jpeg', 0.9);
                const pdfWidth = 210;
                const pdfHeight = (canvas.height * pdfWidth) / canvas.width;

                pdf.addImage(imgData, 'JPEG', 0, 0, pdfWidth, pdfHeight);
                
                const blob = pdf.output('blob');
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `LAPORAN_SBB_${Date.now()}.pdf`;
                a.click();

            } catch (err) {
                alert("Gagal menyimpan PDF!");
            } finally {
                video.style.display = 'block';
                snapCanvas.style.display = 'none';
                btnSave.innerText = "💾 SIMPAN PDF";
                btnSave.disabled = false;
            }
        }
    </script>
</body>
</html>
